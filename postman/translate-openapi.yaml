openapi: 3.0.3
info:
  title: Translate API
  version: 0.3.0
  description: '**Translate API** ŌĆö production-grade translation, i18n batch and multilingual dictionary lookup, powered by
    **Qwen3-14B-AWQ** served on vLLM.


    ## Highlights

    - `POST /v1/translate` ŌĆö single string or batch (up to 100 items, each up to 50 000 chars).

    - `POST /v1/json` ŌĆö i18n array of strings, order-preserving.

    - `POST /v1/dict` ŌĆö rich dictionary entry for language learners (phonetic, definitions, examples, phrases, synonyms/antonyms,
    mnemonic tips).

    - Auto language detection with per-item `detected_source_lang` when `source_lang=auto`; plain `list[str]` response when
    an explicit source is given.

    - Script-purity post-validation with single retry to catch mixed-script outputs.


    ## Quick start

    1. Subscribe on RapidAPI to obtain your `X-RapidAPI-Key`.

    2. `POST /v1/translate` with `{ "text": "Hello", "target_lang": "vi" }`.

    3. Read `translations[*]` ŌĆö strings or `{translated_text, detected_source_lang}` objects depending on `source_lang`.'
  termsOfService: https://translate.spacecloud.fit/terms
  contact:
    name: Translate API Support
    url: https://translate.spacecloud.fit
    email: support@spacecloud.fit
  license:
    name: Proprietary
  x-logo:
    url: https://translate.spacecloud.fit/logo.png
    altText: Translate API
servers:
- url: https://translate.spacecloud.fit
  description: Production server ŌĆö direct
- url: https://translate.p.rapidapi.com
  description: RapidAPI gateway
tags:
- name: translate
  description: Translation endpoints (single/batch + i18n).
- name: dictionary
  description: Multilingual dictionary lookup for learners.
- name: health
  description: Liveness and readiness probes.
- name: info
  description: Model information.
paths:
  /v1/translate:
    post:
      tags:
      - translate
      summary: Translate single text or a batch of strings.
      description: 'Translate one string or up to 100 strings in one request. The response shape depends on `source_lang`:

        - `source_lang=auto` ŌåÆ `translations` is an array of `{translated_text, detected_source_lang}`.

        - explicit `source_lang` ŌåÆ `translations` is an array of strings, in the same order as the input.


        When `text` is a single string, `translations` is still an array (length 1) for shape consistency.'
      operationId: translate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslateRequest'
            examples:
              single_auto:
                summary: Single text + auto detect
                value:
                  text: Hello world
                  target_lang: vi
              single_explicit:
                summary: Single text + explicit source
                value:
                  text: T├┤i y├¬u Viß╗ćt Nam
                  source_lang: vi
                  target_lang: en
              batch_explicit:
                summary: Batch + explicit source
                value:
                  text:
                  - Good morning
                  - Thank you
                  source_lang: en
                  target_lang: vi
              batch_auto_mixed:
                summary: Batch + auto on mixed-language input
                value:
                  text:
                  - ŃüōŃéōŃü½ŃüĪŃü»
                  - ņĢłļģĢĒĢśņäĖņÜö
                  target_lang: vi
      responses:
        '200':
          description: Translation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslateResponse'
              examples:
                auto_with_detected:
                  summary: 'Auto: each item carries detected_source_lang'
                  value:
                    request_id: 03f0ece3-9ad8-4b52-ad0c-40da09487722
                    processing_time_ms: 126
                    translations:
                    - translated_text: Xin ch├Āo thß║┐ giß╗øi
                      detected_source_lang: en
                explicit_strings:
                  summary: 'Explicit source: list of strings'
                  value:
                    request_id: f4bfc370-747e-40c7-a3c0-eb1cb86683af
                    processing_time_ms: 86
                    translations:
                    - Ch├Āo buß╗Ģi s├Īng
                    - Cß║Żm ŲĪn
        '422':
          description: Validation error (invalid lang code, empty text, exceeds size limits, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream LLM error (vLLM backend unreachable or returned error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/json:
    post:
      tags:
      - translate
      summary: Translate an array of strings (i18n batch).
      description: Same response shape as `/v1/translate`. Use this endpoint when your input is always an array (e.g. localization
        keys for a UI). Order is preserved.
      operationId: translateJson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonTranslateRequest'
            examples:
              i18n_explicit:
                summary: i18n keys (explicit enŌåÆja)
                value:
                  texts:
                  - Welcome
                  - Sign in
                  - Sign up
                  source_lang: en
                  target_lang: ja
              i18n_auto:
                summary: Auto detect on mixed batch
                value:
                  texts:
                  - ŃüōŃéōŃü½ŃüĪŃü»
                  - ņĢłļģĢĒĢśņäĖņÜö
                  target_lang: vi
      responses:
        '200':
          description: Translations in the same order as `texts`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonTranslateResponse'
              examples:
                auto_with_detected:
                  summary: Auto output
                  value:
                    request_id: 263aafcd-ea31-423e-bd4b-1591d2f6cbe3
                    processing_time_ms: 109
                    translations:
                    - translated_text: Xin ch├Āo
                      detected_source_lang: ja
                    - translated_text: Xin ch├Āo
                      detected_source_lang: ko
                explicit_strings:
                  summary: Explicit output
                  value:
                    request_id: 8a24186d-df3b-4843-8caf-63702cc1e84c
                    processing_time_ms: 71
                    translations:
                    - ŃéłŃüåŃüōŃüØ
                    - ŃéĄŃéżŃā│ŃéżŃā│
                    - ŃéĄŃéżŃā│ŃéóŃāāŃāŚ
        '422':
          description: Validation error (invalid lang code, empty text, exceeds size limits, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream LLM error (vLLM backend unreachable or returned error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/dict:
    post:
      tags:
      - dictionary
      summary: Look up a multilingual dictionary entry.
      description: 'Multilingual dictionary lookup intended for language learners.


        **Semantics:**

        - `nativeLang` = learner''s mother tongue ŌĆö meanings and tips are emitted here.

        - `targetLang` = the language being learned ŌĆö the language of the input word.


        Output uses **camelCase** keys (`shortMeaning`, `partOfSpeech`, `relatedWords`, `memoryTips`, ...). `phonetic.romanization`
        is non-null for ja/zh/ko/ru/th/ar/hi and null for Latin-script words.


        Latency is typically 2.5ŌĆō3.5 s per request.'
      operationId: dictLookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictRequest'
            examples:
              vi_learning_en:
                summary: VI speaker learning EN ŌĆö 'book'
                value:
                  word: book
                  nativeLang: vi
                  targetLang: en
              vi_learning_ja:
                summary: VI speaker learning JA ŌĆö 'µ£¼'
                value:
                  word: µ£¼
                  nativeLang: vi
                  targetLang: ja
              en_learning_vi:
                summary: EN speaker learning VI ŌĆö 'tß╗▒ do'
                value:
                  word: tß╗▒ do
                  nativeLang: en
                  targetLang: vi
      responses:
        '200':
          description: Dictionary entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictResponse'
              examples:
                vi_learning_en_book:
                  summary: VI speaker learning EN ŌĆö 'book'
                  value:
                    request_id: fa0e1d22-5a3c-4c7e-9f1d-2b1e8d7a4c33
                    processing_time_ms: 2640
                    model_used: translator-3a9f2c10
                    word: book
                    nativeLang: vi
                    targetLang: en
                    phonetic:
                      ipa: /b╩Ŗk/
                      romanization: null
                    shortMeaning: quyß╗ān s├Īch
                    definitions:
                    - partOfSpeech: noun
                      meaning: vß║Łt phß║®m gß╗ōm c├Īc trang giß║źy ─æ├│ng lß║Īi
                    - partOfSpeech: verb
                      meaning: ─æß║Ęt chß╗Ś trŲ░ß╗øc (nh├Ā h├Āng, v├®, ph├▓ng)
                    examples:
                    - text: I bought a book yesterday.
                      meaning: T├┤i ─æ├Ż mua mß╗Öt quyß╗ān s├Īch h├┤m qua.
                    - text: Please book a table for two.
                      meaning: L├Ām ŲĪn ─æß║Ęt b├Ān cho hai ngŲ░ß╗Øi.
                    phrases:
                    - text: by the book
                      meaning: ─æ├║ng theo quy tß║»c
                    - text: book club
                      meaning: c├óu lß║Īc bß╗Ö ─æß╗Źc s├Īch
                    related:
                      synonyms:
                      - text: volume
                        meaning: tß║Łp s├Īch
                      antonyms: []
                      relatedWords:
                      - text: novel
                        meaning: tiß╗āu thuyß║┐t
                      memoryTips:
                      - '''book'' nghe gß║¦n vß╗øi ''b├║c'' ŌĆö ''b├║c cuß╗æn s├Īch'''
        '404':
          description: No dictionary entry found for the requested word.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error (invalid lang code, empty text, exceeds size limits, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream LLM error (vLLM backend unreachable or returned error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /healthz/live:
    get:
      tags:
      - health
      summary: Liveness probe ŌĆö process is up.
      operationId: healthLive
      responses:
        '200':
          description: Process is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthLive'
  /healthz/ready:
    get:
      tags:
      - health
      summary: Readiness probe ŌĆö vLLM backend reachable.
      description: Performs a deep check by issuing a minimal inference call to the vLLM translator backend.
      operationId: healthReady
      responses:
        '200':
          description: Service is ready (backend reachable).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthReady'
        '503':
          description: Backend is degraded or down.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthReady'
  /v1/models:
    get:
      tags:
      - info
      summary: Information about the underlying translator model.
      operationId: modelsInfo
      responses:
        '200':
          description: Model info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsInfo'
components:
  schemas:
    TranslateRequest:
      type: object
      required:
      - text
      - target_lang
      properties:
        text:
          description: Text to translate. Either a single string or an array (max 100 items, each item up to 50 000 characters).
          oneOf:
          - type: string
            minLength: 1
            maxLength: 50000
          - type: array
            minItems: 1
            maxItems: 100
            items:
              type: string
              minLength: 1
              maxLength: 50000
          example:
          - Good morning
          - Thank you
        source_lang:
          type: string
          default: auto
          pattern: ^(auto|[a-z]{2,3}(-[A-Z]{2})?)$
          description: '`auto` lets the model detect; otherwise an ISO 639-1 code (`vi`, `en`, `ja`, `zh`, `ko`, `fr`, `de`,
            ...).'
          example: en
        target_lang:
          type: string
          minLength: 2
          maxLength: 8
          pattern: ^[a-z]{2,3}(-[A-Z]{2})?$
          description: Required ISO 639-1 target language. Cannot be `auto`.
          example: vi
    TranslationDetected:
      type: object
      description: 'Returned when `source_lang=auto`: each item carries its own detected language.'
      required:
      - translated_text
      - detected_source_lang
      properties:
        translated_text:
          type: string
          description: Translated text.
        detected_source_lang:
          type: string
          description: ISO 639-1 code detected from the source text.
          example: en
    TranslateResponse:
      type: object
      required:
      - request_id
      - processing_time_ms
      - translations
      properties:
        request_id:
          type: string
          format: uuid
        processing_time_ms:
          type: integer
          minimum: 0
        translations: &id001
          description: Translations in the same order as the input. When `source_lang=auto`, each item is `{translated_text,
            detected_source_lang}`. When an explicit `source_lang` is given, items are plain strings.
          oneOf:
          - type: array
            items:
              $ref: '#/components/schemas/TranslationDetected'
          - type: array
            items:
              type: string
    JsonTranslateRequest:
      type: object
      required:
      - texts
      - target_lang
      properties:
        texts:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
            minLength: 1
            maxLength: 50000
          description: Array of strings to translate (max 100 items, each up to 50 000 chars).
          example:
          - Welcome
          - Sign in
          - Sign up
        source_lang:
          type: string
          default: auto
          pattern: ^(auto|[a-z]{2,3}(-[A-Z]{2})?)$
          example: en
        target_lang:
          type: string
          minLength: 2
          maxLength: 8
          pattern: ^[a-z]{2,3}(-[A-Z]{2})?$
          description: Required ISO 639-1 target language.
          example: ja
    JsonTranslateResponse:
      type: object
      required:
      - request_id
      - processing_time_ms
      - translations
      properties:
        request_id:
          type: string
          format: uuid
        processing_time_ms:
          type: integer
          minimum: 0
        translations: *id001
    DictRequest:
      type: object
      required:
      - word
      - targetLang
      properties:
        word:
          type: string
          minLength: 1
          maxLength: 200
          description: Word or phrase to look up (in `target_lang` ŌĆö the language being learned).
          example: book
        nativeLang:
          type: string
          default: vi
          minLength: 2
          maxLength: 8
          pattern: ^[a-z]{2,3}(-[A-Z]{2})?$
          description: User's native language ŌĆö meanings/explanations are emitted in this language.
          example: vi
        targetLang:
          type: string
          minLength: 2
          maxLength: 8
          pattern: ^[a-z]{2,3}(-[A-Z]{2})?$
          description: Language being learned ŌĆö the language of the input `word`.
          example: en
    DictPhonetic:
      type: object
      properties:
        ipa:
          type: string
          nullable: true
          description: IPA transcription, e.g. `/b╩Ŗk/`. Null when not available.
          example: /b╩Ŗk/
        romanization:
          type: string
          nullable: true
          description: Romanization for non-Latin scripts (pinyin, romaji, revised romanization). Null for Latin-script words.
          example: null
    DictDefinition:
      type: object
      required:
      - partOfSpeech
      - meaning
      properties:
        partOfSpeech:
          type: string
          description: 'One of: `noun`, `verb`, `adjective`, `adverb`, `preposition`, `conjunction`, `interjection`, `pronoun`,
            `determiner`, `particle`, `phrase`, `idiom`.'
          example: noun
        meaning:
          type: string
          description: Concise definition in `native_lang`.
          example: quyß╗ān s├Īch ŌĆö vß║Łt phß║®m gß╗ōm c├Īc trang giß║źy ─æ├│ng lß║Īi vß╗øi nhau
    DictExample:
      type: object
      required:
      - text
      - meaning
      properties:
        text:
          type: string
          description: Sentence or phrase in `target_lang`.
          example: I bought a book yesterday.
        meaning:
          type: string
          description: Translation into `native_lang`.
          example: T├┤i ─æ├Ż mua mß╗Öt quyß╗ān s├Īch h├┤m qua.
    DictWordRef:
      type: object
      required:
      - text
      - meaning
      properties:
        text:
          type: string
          description: Reference word in `target_lang`.
        meaning:
          type: string
          description: Short gloss in `native_lang`.
    DictRelated:
      type: object
      properties:
        synonyms:
          type: array
          items:
            $ref: '#/components/schemas/DictWordRef'
        antonyms:
          type: array
          items:
            $ref: '#/components/schemas/DictWordRef'
        relatedWords:
          type: array
          items:
            $ref: '#/components/schemas/DictWordRef'
        memoryTips:
          type: array
          items:
            type: string
          description: 1ŌĆō3 short mnemonic tips written in `native_lang`.
    DictResponse:
      type: object
      required:
      - request_id
      - processing_time_ms
      - model_used
      - word
      - nativeLang
      - targetLang
      - phonetic
      - shortMeaning
      - definitions
      - examples
      - related
      properties:
        request_id:
          type: string
          format: uuid
        processing_time_ms:
          type: integer
          minimum: 0
        model_used:
          type: string
          description: Identifier of the LLM serving the lookup, e.g. `translator-<8 hex>`.
        word:
          type: string
          description: Normalized echo of the input word.
        nativeLang:
          type: string
          example: vi
        targetLang:
          type: string
          example: en
        phonetic:
          $ref: '#/components/schemas/DictPhonetic'
        shortMeaning:
          type: string
          description: One-line meaning in `native_lang` ŌĆö suitable for quick display.
          example: quyß╗ān s├Īch
        definitions:
          type: array
          items:
            $ref: '#/components/schemas/DictDefinition'
          description: 1ŌĆō2 main senses.
        examples:
          type: array
          items:
            $ref: '#/components/schemas/DictExample'
          description: 1ŌĆō2 representative example sentences.
        phrases:
          type: array
          items:
            $ref: '#/components/schemas/DictExample'
          description: 0ŌĆō4 common phrases / collocations.
        related:
          $ref: '#/components/schemas/DictRelated'
    HealthLive:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - ok
    HealthReady:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - ok
          - degraded
          - down
        components:
          type: object
          additionalProperties: true
          description: Per-component health (e.g. vLLM translator backend).
        error:
          type: string
    ModelsInfo:
      type: object
      required:
      - service
      - translator
      properties:
        service:
          type: string
          example: translate
        translator:
          type: object
          required:
          - served_name
          - fingerprint
          - url
          properties:
            served_name:
              type: string
            fingerprint:
              type: string
            url:
              type: string
              format: uri
    ErrorResponse:
      type: object
      required:
      - detail
      properties:
        detail:
          oneOf:
          - type: string
          - type: array
            items:
              type: object
          description: Error detail (string for upstream errors, array of validation errors from FastAPI).
