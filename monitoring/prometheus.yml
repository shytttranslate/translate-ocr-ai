global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: vbk-api
    metrics_path: /v1/metrics
    static_configs:
      - targets: ['api:8000']

  - job_name: vllm-translator
    metrics_path: /metrics
    static_configs:
      - targets: ['vllm-translator:8001']

  - job_name: vllm-ocr
    metrics_path: /metrics
    static_configs:
      - targets: ['vllm-ocr:8002']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
